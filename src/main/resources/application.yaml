server:
  compression:
    enabled: true
  port: 55105
  shutdown: graceful

spring:
  main:
    lazy-initialization: false
    allow-bean-definition-overriding: false
  application:
    name: backend-services
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require&sslfactory=org.postgresql.ssl.NonValidatingFactory
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        '[format_sql]': false
        '[generate_statistics]': false
        '[jdbc.batch_size]': 32
        '[order_inserts]': true
        '[order_updates]': true
  jackson:
    default-property-inclusion: NON_NULL
  web:
    error:
      include-stacktrace: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: warn
    org:
      springframework:
        web:
          servlet:
            mvc:
              method:
                annotation:
                  ExceptionHandlerExceptionResolver: error
